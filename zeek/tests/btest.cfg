[btest]
TestDirs=Scripts
TmpDir=%(testbase)s/.tmp
BaselineDir=%(testbase)s/Traces
IgnoreDirs=.svn CVS .git .tmp
IgnoreFiles=*.tmp *.swp #* *.trace .DS_Store

[environment]
ZEEK_SEED_FILE=%(testbase)s/random.seed
TZ=UTC
LC_ALL=C
TRACES=%(testbase)s/../../pcap
BROPATH=`zeek-config --zeekpath`:%(testbase)s/..
ZEEKPATH=`zeek-config --zeekpath`:%(testbase)s/..
ZEEK_PLUGIN_PATH=`zeek-config --plugin_dir`
